<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bracket C: Vertical</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="bracket-shared.css">
  <style>
    body { background: #faf7f1; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 0 1rem 4rem; }

    .stage { margin: 0 auto; }
    .stage-head {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin: 1.6rem 0 0.9rem; position: relative;
    }
    .stage-head h2 {
      font-family: var(--heading); text-transform: uppercase; font-size: 1.05rem;
      color: var(--brown); border: none; margin: 0; padding: 0; letter-spacing: 0;
    }
    .stage-head .count {
      font-size: 0.62rem; font-weight: 700; color: var(--cream);
      background: var(--brown); border-radius: 35px; padding: 0.1rem 0.55rem;
    }
    .stage-head::before, .stage-head::after {
      content: ''; flex: 1; height: 2px; background: var(--border); max-width: 60px;
    }
    /* The pyramid: each deeper stage sits in a narrower band. */
    .stage.s-groups { max-width: 560px; }
    .stage.s-r32 { max-width: 540px; }
    .stage.s-r16 { max-width: 460px; }
    .stage.s-qf  { max-width: 380px; }
    .stage.s-sf  { max-width: 320px; }
    .stage.s-final { max-width: 280px; }

    .group-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .group-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 0.55rem; box-shadow: var(--shadow); }
    .group-card h4 { margin: 0 0 0.35rem; font-family: var(--heading); font-size: 0.78rem; text-transform: uppercase; display: flex; justify-content: space-between; }
    .group-card h4 .prov { font-size: 0.58rem; color: var(--peach); }
    .group-card .tm { padding: 0.2rem 0.28rem; font-size: 0.76rem; gap: 0.32rem; }
    .group-card .tm .crest { width: 15px; height: 15px; }
    .group-card .tm-owner { display: none; }

    .ko-list { display: grid; gap: 0.55rem; }
    .stage.s-r32 .ko-list { grid-template-columns: 1fr 1fr; }
    .vs-card {
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      box-shadow: var(--shadow); padding: 0.5rem 0.6rem;
      display: flex; flex-direction: column; gap: 0.35rem;
    }
    .vs-side { display: flex; align-items: center; gap: 0.45rem; }
    .vs-side .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .vs-side .crest { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }
    .vs-side .nm { flex: 1; font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vs-side .own { font-size: 0.62rem; color: var(--muted); }
    .vs-side .sc { font-weight: 700; font-variant-numeric: tabular-nums; }
    .vs-side.win .nm { color: var(--green-dark); }
    .vs-side.lose { opacity: 0.45; }
    .vs-mid { display: flex; align-items: center; gap: 0.5rem; }
    .vs-mid .ln { flex: 1; height: 1px; background: var(--border); }
    .vs-mid .tag { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .vs-card.tbd .nm { color: var(--muted); font-style: italic; font-weight: 500; }
    .stage.s-final .vs-card, .stage.s-sf .vs-card { padding: 0.7rem 0.8rem; }
    .stage.s-final .vs-side .nm, .stage.s-sf .vs-side .nm { font-size: 0.95rem; }

    .arrow { text-align: center; color: var(--green-dark); font-size: 1.1rem; margin: 0.5rem 0 -0.2rem; }

    .champ {
      margin: 1.4rem auto 0; max-width: 300px; text-align: center;
      background: linear-gradient(160deg, var(--peach), var(--green-soft));
      border: 2px solid var(--green); border-radius: 18px; padding: 1.4rem 1rem;
    }
    .champ .trophy { font-size: 3rem; }
    .champ .lbl { font-family: var(--heading); text-transform: uppercase; font-size: 0.85rem; color: var(--brown-deep); }
    .champ .nm { font-weight: 700; font-size: 1.3rem; margin-top: 0.2rem; }
    .champ .own { font-size: 0.8rem; color: var(--brown-deep); }
  </style>
</head>
<body>
  <nav class="proto-bar" id="nav"></nav>
  <div class="wrap">
    <h1 class="proto-title">The Climb</h1>
    <p class="proto-sub" id="sub">Loading...</p>
    <div class="legend">
      <span><i class="swatch q"></i> Through</span>
      <span><i class="swatch t"></i> 3rd, in contention</span>
      <span><i class="swatch o"></i> Out</span>
    </div>
    <div id="stages"></div>
  </div>
  <script type="module">
    import { loadAll, ownerColours, groupStandings, knockoutRounds, isFinished,
      isLive, hasTeams, winnerLoser, champion } from './bracket-data.js';
    import { protoNav } from './proto-nav.js';

    const el = (t, c, x) => { const n = document.createElement(t); if (c) n.className = c; if (x !== undefined) n.textContent = x; return n; };
    const fmtDate = (d) => new Date(d).toLocaleDateString([], { day: 'numeric', month: 'short' });

    function stageHead(title, count) {
      const head = el('div', 'stage-head');
      head.append(el('h2', null, title));
      if (count != null) head.append(el('span', 'count', count));
      return head;
    }

    function groupCard(g) {
      const card = el('div', 'group-card');
      const h = el('h4'); h.append(el('span', null, 'Group ' + g.letter));
      if (!g.finished) h.append(el('span', 'prov', 'live'));
      card.append(h);
      g.rows.forEach((t) => {
        const cls = t.status === 'qualified' ? 'q' : t.status === 'third' ? 't' : 'out';
        const row = el('div', 'tm ' + cls);
        row.append(el('span', 'rankpill', String(t.rank)));
        if (t.crest) { const i = el('img', 'crest'); i.src = t.crest; row.append(i); }
        row.append(el('span', 'tm-name', t.name));
        row.append(el('span', 'tm-pts', t.points));
        card.append(row);
      });
      return card;
    }

    function vsCard(m, owners, ownersByCode) {
      if (!m || !hasTeams(m)) {
        const card = el('div', 'vs-card tbd');
        const a = el('div', 'vs-side'); a.append(el('span', 'nm', (m && m.home?.name) || 'TBD')); card.append(a);
        const mid = el('div', 'vs-mid'); mid.append(el('span', 'ln')); mid.append(el('span', 'tag', m ? fmtDate(m.utcDate) : 'TBD')); mid.append(el('span', 'ln')); card.append(mid);
        const b = el('div', 'vs-side'); b.append(el('span', 'nm', (m && m.away?.name) || 'TBD')); card.append(b);
        return card;
      }
      const card = el('div', 'vs-card');
      const { winner } = winnerLoser(m);
      const side = (team, score) => {
        const won = winner && winner.code === team.code;
        const lost = winner && winner.code !== team.code;
        const row = el('div', 'vs-side' + (won ? ' win' : lost ? ' lose' : ''));
        const dot = el('span', 'dot');
        const owner = ownersByCode.get(team.code);
        dot.style.background = owner ? owners.get(owner) : 'transparent';
        row.append(dot);
        if (team.crest) { const i = el('img', 'crest'); i.src = team.crest; row.append(i); }
        const nm = el('span', 'nm', team.name); row.append(nm);
        if (owner) row.append(el('span', 'own', owner));
        if (score != null) row.append(el('span', 'sc', score));
        return row;
      };
      card.append(side(m.home, m.homeScore));
      const mid = el('div', 'vs-mid');
      mid.append(el('span', 'ln'));
      mid.append(el('span', 'tag', isLive(m) ? 'LIVE' : isFinished(m) ? (m.decidedBy === 'PENALTIES' ? 'pens' : 'full time') : fmtDate(m.utcDate)));
      mid.append(el('span', 'ln'));
      card.append(mid);
      card.append(side(m.away, m.awayScore));
      return card;
    }

    function render(d) {
      document.querySelector('#sub').textContent =
        'Scroll down from the groups to the champion. Updated ' + new Date(d.lastUpdated).toLocaleString();
      const owners = ownerColours(d.roster);
      const { groups } = groupStandings(d.matches);
      const rounds = knockoutRounds(d.matches);
      const root = document.querySelector('#stages');

      const gStage = el('div', 'stage s-groups');
      gStage.append(stageHead('Groups', 48));
      const grid = el('div', 'group-grid');
      groups.forEach((g) => grid.append(groupCard(g)));
      gStage.append(grid);
      root.append(gStage);
      root.append(el('div', 'arrow', '▼'));

      const cls = { LAST_32: 's-r32', LAST_16: 's-r16', QUARTER_FINALS: 's-qf', SEMI_FINALS: 's-sf', FINAL: 's-final' };
      rounds.forEach((r, idx) => {
        const stage = el('div', 'stage ' + cls[r.key]);
        stage.append(stageHead(r.label, r.matches * 2));
        const list = el('div', 'ko-list');
        r.slots.forEach((m) => list.append(vsCard(m, owners, d.ownersByCode)));
        stage.append(list);
        root.append(stage);
        if (idx < rounds.length - 1) root.append(el('div', 'arrow', '▼'));
      });

      root.append(el('div', 'arrow', '▼'));
      const champ = champion(d.matches);
      const box = el('div', 'champ');
      box.append(el('div', 'trophy', '🏆'));
      box.append(el('div', 'lbl', 'Champions'));
      box.append(el('div', 'nm', champ ? champ.name : 'TBD'));
      const own = champ ? d.ownersByCode.get(champ.code) : null;
      box.append(el('div', 'own', own ? own + ' wins the sweep' : 'To be decided 19 Jul'));
      root.append(box);
    }

    document.querySelector('#nav').replaceWith(protoNav('c'));
    loadAll().then(render).catch((e) => { document.querySelector('#sub').textContent = 'Could not load: ' + e.message; });
  </script>
</body>
</html>
