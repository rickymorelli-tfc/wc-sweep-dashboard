<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bracket B: Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="bracket-shared.css">
  <style>
    body { background: #faf7f1; }
    .wrap { max-width: 1700px; margin: 0 auto; padding: 0 1rem 4rem; }

    details.groups { margin: 0 auto 1.5rem; max-width: 1100px; }
    details.groups > summary {
      cursor: pointer; font-family: var(--heading); text-transform: uppercase;
      color: var(--brown); background: var(--cream); border: 1px solid var(--border);
      border-radius: 35px; padding: 0.4rem 1rem; font-size: 0.85rem; list-style: none;
      text-align: center;
    }
    .group-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0.6rem; margin-top: 1rem; }
    .group-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 0.45rem; }
    .group-card h4 { margin: 0 0 0.3rem; font-family: var(--heading); font-size: 0.74rem; text-transform: uppercase; }
    .group-card .tm { padding: 0.18rem 0.25rem; font-size: 0.72rem; gap: 0.3rem; }
    .group-card .tm .crest { width: 14px; height: 14px; }

    .tree {
      display: flex; align-items: stretch; justify-content: center;
      gap: 0; overflow-x: auto; padding: 1rem 0;
    }
    .half { display: flex; align-items: stretch; }
    .col {
      display: flex; flex-direction: column; justify-content: space-around;
      min-width: 150px; padding: 0 0.9rem;
    }
    .round-label {
      text-align: center; font-size: 0.62rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.4rem; font-weight: 600;
    }
    .col-body { display: flex; flex-direction: column; justify-content: space-around; flex: 1; }
    .pair { display: flex; flex-direction: column; justify-content: space-around; flex: 1; position: relative; }

    .mbox {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      box-shadow: var(--shadow); padding: 0.25rem 0.35rem; margin: 0.35rem 0;
      display: flex; flex-direction: column; gap: 0.12rem; position: relative;
    }
    .mrow { display: flex; align-items: center; gap: 0.3rem; }
    .mrow .crest { width: 14px; height: 14px; object-fit: contain; flex-shrink: 0; }
    .mrow .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mrow .nm { flex: 1; font-size: 0.68rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mrow .sc { font-size: 0.68rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mrow.win .nm { color: var(--green-dark); }
    .mrow.lose { opacity: 0.4; }
    .mbox.tbd .nm { color: var(--muted); font-style: italic; font-weight: 500; }
    .mbox .when { font-size: 0.55rem; color: var(--muted); text-align: center; }

    /* Connector brackets. Left half: brackets on the right of each pair.
       Right half mirrored. */
    .half.left .pair::after,
    .half.right .pair::after {
      content: ''; position: absolute; top: 25%; bottom: 25%; width: 0.9rem;
      border: 2px solid var(--border);
    }
    .half.left .pair::after { right: -0.9rem; border-left: none; border-radius: 0 6px 6px 0; }
    .half.right .pair::after { left: -0.9rem; border-right: none; border-radius: 6px 0 0 6px; }
    /* stub from the bracket into the next column */
    .half.left .pair::before,
    .half.right .pair::before {
      content: ''; position: absolute; top: 50%; width: 0.9rem; height: 2px; background: var(--border);
    }
    .half.left .pair::before { right: -1.8rem; }
    .half.right .pair::before { left: -1.8rem; }

    .final-col { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 0.6rem; }
    .final-box {
      background: linear-gradient(160deg, var(--peach), var(--green-soft));
      border: 2px solid var(--green); border-radius: 14px; padding: 0.8rem 0.7rem;
      text-align: center; min-width: 150px;
    }
    .final-box .ttl { font-family: var(--heading); text-transform: uppercase; font-size: 0.7rem; color: var(--brown-deep); }
    .final-box .trophy { font-size: 1.8rem; }
    .final-box .nm { font-weight: 700; font-size: 0.95rem; }
    .final-box .own { font-size: 0.68rem; color: var(--brown-deep); }
    .final-box .mbox { margin: 0.5rem 0 0; background: rgba(255,255,255,0.7); }

    .note { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 1rem; }
  </style>
</head>
<body>
  <nav class="proto-bar" id="nav"></nav>
  <div class="wrap">
    <h1 class="proto-title">Bracket Tree</h1>
    <p class="proto-sub" id="sub">Loading...</p>
    <div class="legend">
      <span><i class="swatch q"></i> Through</span>
      <span><i class="swatch t"></i> 3rd, in contention</span>
      <span><i class="swatch o"></i> Out</span>
      <span>Colour dot = sweep owner</span>
    </div>
    <details class="groups" open>
      <summary>12 Groups (who is qualifying)</summary>
      <div class="group-strip" id="strip"></div>
    </details>
    <div class="tree" id="tree"></div>
    <p class="note">Knockout pairings are illustrative until the feed resolves the bracket. Teams and scores are real as they land.</p>
  </div>
  <script type="module">
    import { loadAll, ownerColours, groupStandings, knockoutRounds, isFinished,
      isLive, hasTeams, winnerLoser, champion } from './bracket-data.js';
    import { protoNav } from './proto-nav.js';

    const el = (t, c, x) => { const n = document.createElement(t); if (c) n.className = c; if (x !== undefined) n.textContent = x; return n; };
    const fmtDate = (d) => new Date(d).toLocaleDateString([], { day: 'numeric', month: 'short' });

    function groupCard(g) {
      const card = el('div', 'group-card');
      card.append(el('h4', null, 'Group ' + g.letter + (g.finished ? '' : ' (live)')));
      g.rows.forEach((t) => {
        const cls = t.status === 'qualified' ? 'q' : t.status === 'third' ? 't' : 'out';
        const row = el('div', 'tm ' + cls);
        row.append(el('span', 'rankpill', String(t.rank)));
        if (t.crest) { const i = el('img', 'crest'); i.src = t.crest; row.append(i); }
        row.append(el('span', 'tm-name', t.name));
        row.append(el('span', 'tm-pts', t.points));
        card.append(row);
      });
      return card;
    }

    function mbox(m, owners, ownersByCode) {
      if (!m || !hasTeams(m)) {
        const box = el('div', 'mbox tbd');
        const a = el('div', 'mrow'); a.append(el('span', 'nm', (m && m.home?.name) || 'TBD')); box.append(a);
        const b = el('div', 'mrow'); b.append(el('span', 'nm', (m && m.away?.name) || 'TBD')); box.append(b);
        return box;
      }
      const box = el('div', 'mbox');
      const { winner } = winnerLoser(m);
      const side = (team, score) => {
        const won = winner && winner.code === team.code;
        const lost = winner && winner.code !== team.code;
        const row = el('div', 'mrow' + (won ? ' win' : lost ? ' lose' : ''));
        const dot = el('span', 'dot');
        const owner = ownersByCode.get(team.code);
        dot.style.background = owner ? owners.get(owner) : 'transparent';
        row.append(dot);
        if (team.crest) { const i = el('img', 'crest'); i.src = team.crest; row.append(i); }
        row.append(el('span', 'nm', team.name));
        if (score != null) row.append(el('span', 'sc', score));
        return row;
      };
      box.append(side(m.home, m.homeScore));
      box.append(side(m.away, m.awayScore));
      box.append(el('div', 'when', isLive(m) ? 'LIVE' : isFinished(m) ? 'FT' : fmtDate(m.utcDate)));
      return box;
    }

    // A round column. Matches wrap into pairs so the CSS bracket connectors
    // line up. A single-match round (SF) renders without a pair wrapper.
    function column(matches, label, side, owners, ownersByCode) {
      const col = el('div', 'col');
      col.append(el('div', 'round-label', label));
      const body = el('div', 'col-body');
      if (matches.length >= 2) {
        for (let i = 0; i < matches.length; i += 2) {
          const pair = el('div', 'pair');
          pair.append(mbox(matches[i], owners, ownersByCode));
          pair.append(mbox(matches[i + 1], owners, ownersByCode));
          body.append(pair);
        }
      } else {
        body.append(mbox(matches[0], owners, ownersByCode));
      }
      col.append(body);
      return col;
    }

    function render(d) {
      document.querySelector('#sub').textContent =
        'Updated ' + new Date(d.lastUpdated).toLocaleString();
      const owners = ownerColours(d.roster);
      const { groups } = groupStandings(d.matches);
      const strip = document.querySelector('#strip');
      groups.forEach((g) => strip.append(groupCard(g)));

      const rounds = knockoutRounds(d.matches);
      const byKey = Object.fromEntries(rounds.map((r) => [r.key, r.slots]));
      const halfOf = (slots) => [slots.slice(0, slots.length / 2), slots.slice(slots.length / 2)];
      const [r32L, r32R] = halfOf(byKey.LAST_32);
      const [r16L, r16R] = halfOf(byKey.LAST_16);
      const [qfL, qfR] = halfOf(byKey.QUARTER_FINALS);
      const [sfL, sfR] = halfOf(byKey.SEMI_FINALS);
      const finalM = byKey.FINAL[0];

      const tree = document.querySelector('#tree');
      const left = el('div', 'half left');
      left.append(column(r32L, 'R32', 'left', owners, d.ownersByCode));
      left.append(column(r16L, 'R16', 'left', owners, d.ownersByCode));
      left.append(column(qfL, 'QF', 'left', owners, d.ownersByCode));
      left.append(column(sfL, 'SF', 'left', owners, d.ownersByCode));
      tree.append(left);

      const champ = champion(d.matches);
      const fcol = el('div', 'final-col');
      const fbox = el('div', 'final-box');
      fbox.append(el('div', 'trophy', '🏆'));
      fbox.append(el('div', 'ttl', 'Final'));
      fbox.append(mbox(finalM, owners, d.ownersByCode));
      fbox.append(el('div', 'nm', champ ? champ.name : ''));
      const own = champ ? d.ownersByCode.get(champ.code) : null;
      if (own) fbox.append(el('div', 'own', own + ' wins the sweep'));
      fcol.append(fbox);
      tree.append(fcol);

      const right = el('div', 'half right');
      right.append(column(sfR, 'SF', 'right', owners, d.ownersByCode));
      right.append(column(qfR, 'QF', 'right', owners, d.ownersByCode));
      right.append(column(r16R, 'R16', 'right', owners, d.ownersByCode));
      right.append(column(r32R, 'R32', 'right', owners, d.ownersByCode));
      tree.append(right);
    }

    document.querySelector('#nav').replaceWith(protoNav('b'));
    loadAll().then(render).catch((e) => { document.querySelector('#sub').textContent = 'Could not load: ' + e.message; });
  </script>
</body>
</html>
