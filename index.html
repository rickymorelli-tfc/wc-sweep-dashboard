<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TFC World Cup Sweep 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>&#9917;</text></svg>">
</head>
<body>
  <header>
    <div class="header-inner">
      <p class="kicker">The Foot Collective</p>
      <h1>World Cup Sweep 2026</h1>
      <p id="updated" class="updated">Loading scores...</p>
    </div>
  </header>
  <main>
    <section id="leader-hero" class="hidden"></section>
    <section>
      <h2>Leaderboard</h2>
      <div id="leaderboard" class="card"></div>
    </section>
    <section>
      <h2>Today</h2>
      <div id="today" class="match-list"></div>
    </section>
    <section>
      <h2>Latest results</h2>
      <div id="latest" class="match-list"></div>
    </section>
  </main>
  <footer>
    <p>Win 3, draw 1, loss 0 across the whole tournament. Shootouts count as draws. Your two teams combined; ties broken by goal difference, then goals scored. Scores refresh every couple of hours.</p>
  </footer>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
